<!-- ===== МОДАЛКА АВТОРИЗАЦИИ ===== -->
<div class="modal-overlay" id="authModal">
    <div class="modal-content">
        <h2 id="modalTitle">🔐 Вход</h2>
        <p class="modal-subtitle" id="modalSubtitle">Войдите в свой аккаунт</p>

        <div id="loginForm">
            <div class="form-group">
                <label>Email <span class="required">*</span></label>
                <input type="email" id="loginEmail" placeholder="ivanov@school21.ru">
                <div class="error-text" id="loginEmailError"><span class="icon">❌</span> Введите корректный email</div>
            </div>
            <div class="form-group">
                <label>Пароль <span class="required">*</span></label>
                <input type="password" id="loginPassword" placeholder="Введите пароль">
                <div class="error-text" id="loginPasswordError"><span class="icon">❌</span> Введите пароль</div>
            </div>
            <button class="btn-submit" id="loginBtnSubmit" onclick="handleLogin()">Войти</button>
        </div>

        <div id="registerForm" style="display:none;">
            <div class="form-group">
                <label>ФИО <span class="required">*</span></label>
                <input type="text" id="registerName" placeholder="Иванов Иван">
                <div class="error-text" id="registerNameError"><span class="icon">❌</span> Введите имя и фамилию</div>
            </div>
            <div class="form-group">
                <label>Email <span class="required">*</span></label>
                <input type="email" id="registerEmail" placeholder="ivanov@school21.ru">
                <div class="error-text" id="registerEmailError"><span class="icon">❌</span> Введите корректный email</div>
            </div>
            <div class="form-group">
                <label>Пароль <span class="required">*</span></label>
                <input type="password" id="registerPassword" placeholder="Минимум 4 символа">
                <div class="error-text" id="registerPasswordError"><span class="icon">❌</span> Пароль должен быть не менее 4 символов</div>
            </div>
            <div class="form-group">
                <label>Подтвердите пароль <span class="required">*</span></label>
                <input type="password" id="registerPasswordConfirm" placeholder="Повторите пароль">
                <div class="error-text" id="registerPasswordConfirmError"><span class="icon">❌</span> Пароли не совпадают</div>
            </div>
            <button class="btn-submit" id="registerBtnSubmit" onclick="handleRegister()">Зарегистрироваться</button>
        </div>

        <div class="form-footer">
            <span id="formFooterText">Нет аккаунта?</span>
            <a id="formFooterLink" onclick="switchAuthMode()">Зарегистрироваться</a>
        </div>
        <button class="btn-close" onclick="closeModal()">Закрыть</button>
    </div>
</div>
